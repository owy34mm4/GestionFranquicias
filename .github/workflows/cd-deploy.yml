name: Deploy to ECS

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f deployment/Dockerfile \
            -t $ECR_REGISTRY/franquicia:${{ github.sha }} \
            -t $ECR_REGISTRY/franquicia:latest .
          docker push $ECR_REGISTRY/franquicia:${{ github.sha }}
          docker push $ECR_REGISTRY/franquicia:latest

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster franquicia-cluster \
            --service franquicia-service \
            --force-new-deployment

      - name: Wait for service to be stable
        run: |
          aws ecs wait services-stable \
            --cluster franquicia-cluster \
            --services franquicia-service

      - name: Show api gateway url
        run: |
          API_URL=$(aws apigatewayv2 get-apis --query "Items[?Name=='franquicia-api'].ApiEndpoint" --output text)
          echo "App is available at: $API_URL"

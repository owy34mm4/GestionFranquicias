server:
  port: 8080
spring:
  application:
    name: "Franquicia"
  devtools:
    add-properties: false
  r2dbc:
    url: "r2dbc:mysql://localhost:3306/franchise"
    username: "root"
    password: "root"
    pool:
      enabled: true
      initial-size: 5
      max-size: 15
  sql:
    init:
      mode: "always"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

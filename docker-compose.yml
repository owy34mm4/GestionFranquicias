services:
  mysql:
    image: mysql:8.4
    container_name: franchise-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "franchise"
    ports:
      - "3306:3306"
    healthcheck:
      # Force a real TCP + auth check against the target DB so we only report healthy once
      # MySQL finished first-init (temporary server + restart) and accepts network connections.
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -uroot -proot -e 'SELECT 1' franchise || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  adminer:
    image: adminer:latest
    container_name: franchise-adminer
    ports:
      - "8001:8080"
    environment:
      ADMINER_DEFAULT_SERVER: "mysql"
    depends_on:
      - mysql

  app:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: franchise-app
    # Safety net: if the app loses a startup race against DB readiness, let Docker restart it.
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      # Spring relaxed binding: SPRING_R2DBC_URL -> spring.r2dbc.url, etc.
      SPRING_R2DBC_URL: "r2dbc:mysql://mysql:3306/franchise"
      SPRING_R2DBC_USERNAME: "root"
      SPRING_R2DBC_PASSWORD: "root"
      SPRING_SQL_INIT_MODE: "always"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 5G
